<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev House Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #111111;
      --fg: #f0efed;
      --accent: #c963e0;
      --muted: #888;
      --label: #8a8a9a;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: var(--fg);
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1.25rem;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.2s, color 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    .nav-cta:hover {
      background: var(--accent);
      color: #fff;
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
    }

    .hero-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--label);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.4s forwards;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: var(--fg);
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.55s forwards;
    }

    .hero-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 300;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.65;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.7s forwards;
    }

    /* Subtle radial glow behind title */
    .hero::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(201, 99, 224, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      nav {
        padding: 1rem 1.25rem;
      }
      .hero {
        padding: 5rem 1.5rem 3rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="mailto:contact@devhouselabs.io" class="nav-cta">Get in touch</a>
  </nav>

  <section class="hero">
    <p class="hero-label">Introducing</p>
    <h1 class="hero-title">Dev House Labs.</h1>
    <p class="hero-sub">We transform your ideas into cutting-edge digital solutions.</p>
  </section>

</body>
</html>
